<!DOCTYPE html>
<html>
<body>

<h1 style="background-color:#1e90ff;">Hello World</h1>

<div style="text-align: center; margin-top: 50px; margin-bottom: 50px; margin-left: 50px; margin-right: 50px;"></div>
<button onclick="toggleColor()">Click Me</button>
<style>






button {
    background-color: #05f7e7;
    border: 4px solid purple;
    color: rgb(89, 8, 116);
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 12px;
}
</style>

<script>
let isBlue = false;

function toggleColor() {
  if (isBlue) {
    document.body.style.backgroundColor = "white";
  } else {
    document.body.style.backgroundColor = "pink";
  }
  isBlue = !isBlue;
}
</script>

</div>
</body>
</html>
